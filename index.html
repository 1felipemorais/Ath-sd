<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Links</title>
    <style>
        /* Estilos básicos para deixar a página com visual moderno */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
        }

        /* Barra superior */
        header {
            background-color: #0A3465;
            color: white;
            padding: 5px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        /* Estilo do seletor de empresas */
        .seletor-empresa label {
            margin-right: 10px;
            font-weight: bold;
        }

        .seletor-empresa select {
            padding: 8px 12px;
            font-size: 1rem;
            border-radius: 4px;
            border: none;
            outline: none;
            cursor: pointer;
        }

        /* Container principal */
        main {
            padding: 20px 30px;
        }

        /* Controle das seções por empresa */
        .secao-empresa {
            display: none; /* Escondido por padrão */
        }

        .secao-empresa.ativo {
            display: block; /* Mostra a empresa selecionada */
            animation: fadeIn 0.4s ease-in-out;
        }

        /* Títulos das Categorias */
        .titulo-categoria {
            text-align: center;
            color: #0A3465;
            margin-top: 30px;
            margin-bottom: 20px;
            font-size: 1.3rem;
            border-bottom: 2px solid #ebebeb;
            padding-bottom: 10px;
            font-weight: 700;
        }

        /* CORREÇÃO: Área modificada para CSS Grid (Garante quebra exata a cada 4 itens) */
        .container-links {
            display: grid;
            grid-template-columns: repeat(4, 140px); /* Força o limite máximo de 4 colunas */
            justify-content: center; /* Centraliza o bloco na tela */
            gap: 20px;
        }

        /* Responsividade automática para telas menores (Tablets e Celulares) */
        @media (max-width: 680px) {
            .container-links {
                grid-template-columns: repeat(2, 140px); /* Passa para 2 itens por linha */
            }
        }
        @media (max-width: 360px) {
            .container-links {
                grid-template-columns: repeat(1, 140px); /* Passa para 1 item por linha em telas muito pequenas */
            }
        }

        /* Estilo de cada "botão" de link com imagem */
        .cartao-link {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: #2c3e50;
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.2s;
            width: 150px; /* Largura fixa para manter o padrão */
            box-sizing: border-box; /* Garante que as bordas internos não deformem o grid */
            display: flex;
            flex-direction: column; /* Organiza imagem em cima e texto embaixo */
            align-items: center; /* Centraliza o conteúdo dentro do cartão */
            text-align: center;
        }

        .cartao-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* Estilo do espaço para a imagem */
        .cartao-link img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            margin-bottom: 15px;
            border-radius: 8px;
            background-color: #ecf0f1; /* Cor de fundo provisória */
        }

        /* Animação suave na troca de tela */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    </main>

    <script>
        function filtrarLinks() {
            // Pega o valor selecionado no dropdown (ex: 'empresa2')
            const empresaSelecionada = document.getElementById('empresa').value;
            
            // Pega todas as seções de empresas
            const todasAsSecoes = document.querySelectorAll('.secao-empresa');
            
            // Passa por cada seção ligando ou desligando com base no ID
            todasAsSecoes.forEach(secao => {
                if (secao.id === empresaSelecionada) {
                    secao.classList.add('ativo'); // Mostra a seção correta
                } else {
                    secao.classList.remove('ativo'); // Esconde as outras
                }
            });
        }
    </script>
